<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Exchange - ACity Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/theme.css">
    <style>
        .skill-card {
            transition: all 0.3s ease;
        }
        .skill-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
        }
        .navbar-shadow {
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="navbar-shadow bg-white sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-gradient-to-r from-blue-600 to-purple-600 p-2 rounded-lg">
                    <span class="text-white font-bold">AC</span>
                </div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">ACity Connect</h1>
            </div>
            <button class="mobile-menu-btn md:hidden" aria-label="Toggle navigation" aria-expanded="false"><i class="fas fa-bars"></i></button>
            <div class="nav-links hidden md:flex gap-6 items-center">
                <a href="index.html" class="nav-link">Home</a>
                <a href="marketplace.html" class="nav-link">Marketplace</a>
                <a href="skills.html" class="nav-link active">Skills</a>
                <a href="profile.html" class="btn btn-primary">Profile</a>
            </div>
        </div>
    </nav>

    <!-- Header Section -->
    <div class="bg-gradient-to-r from-purple-50 to-blue-50 py-12">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div>
                    <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-2">Skill Exchange</h1>
                    <p class="text-gray-600">Learn from others and share your expertise with the community</p>
                </div>
                <a href="create-skill.html" class="bg-gradient-to-r from-blue-600 to-purple-600 text-white px-8 py-3 rounded-lg font-bold hover:shadow-lg transition whitespace-nowrap">
                    <i class="fas fa-plus"></i> Offer/Request Skill
                </a>
            </div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex gap-3 mb-8 bg-white p-4 rounded-2xl shadow-md w-fit">
            <button onclick="showTab('offered')" class="px-6 py-2 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg font-bold transition hover:shadow-lg">
                <i class="fas fa-star"></i> Skills Offered
            </button>
            <button onclick="showTab('needed')" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg font-bold transition hover:bg-gray-300">
                <i class="fas fa-bullseye"></i> Skills Needed
            </button>
        </div>

        <!-- Offered Skills -->
        <div id="offered-section" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Skills will be loaded here -->
            <div class="col-span-full text-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
                <p class="text-gray-500 mt-4">Loading skills...</p>
            </div>
        </div>

        <!-- Needed Skills (hidden by default) -->
        <div id="needed-section" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Skills will be loaded here -->
            <div class="col-span-full text-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
                <p class="text-gray-500 mt-4">Loading skills...</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-300 py-12 mt-20">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>&copy; 2024 ACity Connect. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script>
        async function loadSkills() {
            try {
                const response = await apiCall('/skills');
                displayOfferedSkills(response.filter(s => s.skill_offered));
                displayNeededSkills(response.filter(s => s.skill_needed));
            } catch (error) {
                console.error('Failed to load skills:', error);
            }
        }

        function displayOfferedSkills(skills) {
            const container = document.getElementById('offered-section');

            if (skills.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-gray-500 py-12">No skills being offered yet</div>';
                return;
            }

            container.innerHTML = skills.map(skill => `
                <div class="skill-card bg-gradient-to-br from-green-50 to-green-100 p-6 rounded-2xl border border-green-200">
                    <div class="flex items-start justify-between mb-4">
                        <h3 class="text-xl font-bold text-green-700 flex-1"><i class="fas fa-star"></i> ${skill.skill_offered}</h3>
                        <span class="bg-green-600 text-white px-2 py-1 rounded text-xs font-bold">Offered</span>
                    </div>
                    <p class="text-gray-700 mb-4 line-clamp-3">${skill.description || 'No description provided'}</p>
                    <div class="flex justify-between items-center pt-4 border-t border-green-200">
                        <span class="text-xs text-gray-500">${new Date(skill.created_at).toLocaleDateString()}</span>
                        <button onclick="contactUser(${skill.user_id})" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-green-700 transition">
                            <i class="fas fa-comment"></i> Contact
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function displayNeededSkills(skills) {
            const container = document.getElementById('needed-section');

            if (skills.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-gray-500 py-12">No skills being requested yet</div>';
                return;
            }

            container.innerHTML = skills.map(skill => `
                <div class="skill-card bg-gradient-to-br from-blue-50 to-blue-100 p-6 rounded-2xl border border-blue-200">
                    <div class="flex items-start justify-between mb-4">
                        <h3 class="text-xl font-bold text-blue-700 flex-1"><i class="fas fa-bullseye"></i> ${skill.skill_needed}</h3>
                        <span class="bg-blue-600 text-white px-2 py-1 rounded text-xs font-bold">Needed</span>
                    </div>
                    <p class="text-gray-700 mb-4 line-clamp-3">${skill.description || 'No description provided'}</p>
                    <div class="flex justify-between items-center pt-4 border-t border-blue-200">
                        <span class="text-xs text-gray-500">${new Date(skill.created_at).toLocaleDateString()}</span>
                        <button onclick="contactUser(${skill.user_id})" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition">
                            <i class="fas fa-comment"></i> Contact
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function showTab(tab) {
            if (tab === 'offered') {
                document.getElementById('offered-section').classList.remove('hidden');
                document.getElementById('needed-section').classList.add('hidden');
            } else {
                document.getElementById('offered-section').classList.add('hidden');
                document.getElementById('needed-section').classList.remove('hidden');
            }
        }

        function contactUser(userId) {
            if (!isLoggedIn()) {
                window.location.href = 'auth.html';
                return;
            }
            alert('Messaging user ' + userId + ' - coming soon!');
        }

        document.addEventListener('DOMContentLoaded', loadSkills);
    </script>
    <script src="js/ui.js"></script>
</body>
</html>
